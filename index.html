// ── helpers ──────────────────────────────────────────────────────────────────
function getTodayStr(){return new Date().toISOString().split("T")[0];}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function formatDate(ds){return new Date(ds+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function getDow(ds){return["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][new Date(ds+"T00:00:00").getDay()===0?6:new Date(ds+"T00:00:00").getDay()-1];}
function daysUntil(ds){return Math.round((new Date(ds+"T00:00:00")-new Date(getTodayStr()))/86400000);}

function nextOccurrences(item,count=4){
  const today=getTodayStr(),results=[];
  if(item.freq==="weekly"){
    const map={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
    const dow=new Date(today+"T00:00:00").getDay(),ti=dow===0?6:dow-1;
    const sel=(item.days||[]).map(d=>map[d]).sort((a,b)=>a-b);
    if(!sel.length)return[];
    let off=0,ch=0;
    while(results.length<count&&ch<60){const idx=(ti+off)%7;if(sel.includes(idx)){const d=addDays(today,off);results.push({date:d,remind:addDays(d,-(item.advanceDays||0))});}off++;ch++;}
  }else if(item.freq==="monthly"){
    const d=new Date(today+"T00:00:00");
    for(let i=0;results.length<count&&i<count+3;i++){const yr=d.getFullYear()+Math.floor((d.getMonth()+i)/12),mo=(d.getMonth()+i)%12,day=Math.min(item.monthDay||1,new Date(yr,mo+1,0).getDate()),occ=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;if(occ>=today)results.push({date:occ,remind:addDays(occ,-(item.advanceDays||0))});}
  }else if(item.freq==="every X days"){
    let start=item.startDate||today;
    while(start<today)start=addDays(start,item.intervalDays||30);
    for(let i=0;i<count;i++){const occ=addDays(start,i*(item.intervalDays||30));results.push({date:occ,remind:addDays(occ,-(item.advanceDays||0))});}
  }
  return results;
}

// ── Firestore helpers ────────────────────────────────────────────────────────
async function loadPage(pageId){
  try{
    const snap=await getDoc(doc(db,"pages",pageId));
    if(snap.exists())return snap.data();
    return null;
  }catch(e){console.error(e);return null;}
}

async function savePage(pageId,data){
  try{await setDoc(doc(db,"pages",pageId),data,{merge:true});}
  catch(e){console.error(e);}
}

async function loadSettings(){
  try{const snap=await getDoc(doc(db,"settings","global"));return snap.exists()?snap.data():{};}
  catch(e){return{};}
}

async function saveSettings(data){
  try{await setDoc(doc(db,"settings","global"),data,{merge:true});}
  catch(e){console.error(e);}
}

// ── Push notifications ───────────────────────────────────────────────────────
async function setupNotifications(){
  try{
    if(!("Notification" in window))return;
    const perm=await Notification.requestPermission();
    if(perm!=="granted")return;
    if("serviceWorker" in navigator){
      const reg=await navigator.serviceWorker.register("/firebase-messaging-sw.js");
      const messaging=getMessaging(firebaseApp);
      const token=await getToken(messaging,{vapidKey:VAPID_KEY,serviceWorkerRegistration:reg});
      console.log("FCM token:",token);
      await setDoc(doc(db,"fcm_tokens","device"),{token,updated:new Date().toISOString()});
    }
  }catch(e){console.warn("Notification setup:",e);}
}

function scheduleLocalNotifications(allPages){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  const today=getTodayStr();
  allPages.forEach(page=>{
    (page.items||[]).forEach(item=>{
      const occs=nextOccurrences(item,4);
      occs.forEach(occ=>{
        if(occ.remind===today){
          const du=daysUntil(occ.date);
          const msg=du===0?`${item.name} is TODAY!`:`Book ${item.name} — due in ${du} day${du===1?"":"s"}`;
          new Notification("🌿 Reminder",{body:msg,icon:"/icon.png"});
        }
      });
    });
  });
}

  const[editing,setEditing]=useState(false);
  const[draft,setDraft]=useState(item.memo||"");
  const save=()=>{onSaveMemo(item.id,draft);setEditing(false);};
  if(!editing)return React.createElement("div",null,
    item.memo
      ?React.createElement("div",{style:st.memoBox},item.memo,React.createElement("br"),React.createElement("button",{style:{...st.ghostBtn,marginTop:4},onClick:()=>setEditing(true)},"✏️ Edit notes"))
      :React.createElement("button",{style:st.ghostBtn,onClick:()=>setEditing(true)},"+ notes")
  );
  return React.createElement("div",{style:{marginTop:6}},
    React.createElement("textarea",{style:st.memoTA,value:draft,onChange:e=>setDraft(e.target.value),placeholder:"Write your notes...",autoFocus:true}),
    React.createElement("div",{style:{display:"flex",gap:6,marginTop:4}},
      React.createElement("button",{style:{...st.doneBtn,background:C.peanut,color:"#fff"},onClick:save},"Save"),
      React.createElement("button",{style:{...st.doneBtn,background:C.card,color:C.text},onClick:()=>setEditing(false)},"Cancel")
    )
  );
}

function PageView({st,page,catColors,onUpdate}){
  const[items,setItems]=useState(page.items||[]);
  const[cats,setCats]=useState(page.cats||DEFAULT_CATS);
  const[catCol,setCatCol]=useState(page.catColors||DEFAULT_CAT_COLORS);
  const[showAdd,setShowAdd]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[showAddCat,setShowAddCat]=useState(false);
  const[expanded,setExpanded]=useState({});
  let ci=0;

  useEffect(()=>{setItems(page.items||[]);setCats(page.cats||DEFAULT_CATS);setCatCol(page.catColors||DEFAULT_CAT_COLORS);},[page]);

  const save=(newItems,newCats,newCatCol)=>{
    const d={...page,items:newItems||items,cats:newCats||cats,catColors:newCatCol||catCol};
    onUpdate(d);
  };

  const toggleDone=(id,k)=>{const ni=items.map(it=>it.id===id?{...it,done:{...it.done,[k]:!it.done[k]}}:it);setItems(ni);save(ni);};
  const deleteItem=id=>{if(window.confirm("Delete?")){{const ni=items.filter(it=>it.id!==id);setItems(ni);save(ni);}};};
  const addItem=item=>{const ni=[...items,item];setItems(ni);save(ni);setShowAdd(false);};
  const saveEdit=u=>{const ni=items.map(it=>it.id===u.id?u:it);setItems(ni);save(ni);setEditItem(null);};
  const saveMemo=(id,memo)=>{const ni=items.map(it=>it.id===id?{...it,memo}:it);setItems(ni);save(ni);};
  const toggleExpand=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const addCat=name=>{const color=EXTRA_COLORS[ci%EXTRA_COLORS.length];ci++;const nc=[...cats,name],ncc={...catCol,[name]:color};setCats(nc);setCatCol(ncc);save(null,nc,ncc);setShowAddCat(false);};

  const today=getTodayStr();
  const todayAlerts=[];
  items.forEach(item=>nextOccurrences(item,8).forEach(occ=>{if(occ.remind===today||occ.date===today)todayAlerts.push({name:item.name,date:occ.date,isEvent:occ.date===today});}));
  const presentCats=cats.filter(c=>items.some(i=>i.cat===c));

  return React.createElement("div",null,
    React.createElement("div",{style:st.todayBox},
      React.createElement("div",{style:{fontSize:st.secTitle.fontSize,letterSpacing:2,textTransform:"uppercase",opacity:0.85}},"📌 Today's Alerts"),
      todayAlerts.length===0
        ?React.createElement("div",{style:{fontSize:st.remindBadge.fontSize,opacity:0.85,marginTop:6}},"Nothing urgent today — enjoy your day! 🌿")
        :todayAlerts.map((a,i)=>React.createElement("div",{key:i,style:{fontSize:st.occChip.fontSize,marginTop:6}},a.isEvent?"🔔":"📅"," ",React.createElement("b",null,a.name)," — ",a.isEvent?"Today!":"Book by today (event: "+formatDate(a.date)+")"))
    ),
    presentCats.map(cat=>React.createElement("div",{key:cat,style:st.section},
      React.createElement("div",{style:st.secTitle},cat),
      items.filter(i=>i.cat===cat).map(item=>{
        const allOccs=nextOccurrences(item,6),isExp=expanded[item.id],shown=isExp?allOccs:allOccs.slice(0,1);
        return React.createElement("div",{key:item.id,style:{...st.card,borderLeftColor:catCol[item.cat]||C.taupe}},
          React.createElement("div",{style:st.row},
            React.createElement("div",{style:{flex:1}},
              React.createElement("span",{style:st.itemName},item.name),
              React.createElement("div",{style:{marginTop:3,display:"flex",gap:4,flexWrap:"wrap"}},
                React.createElement("span",{style:{...st.tag,background:catCol[item.cat]||C.taupe}},item.cat),
                React.createElement("span",{style:{...st.tag,background:C.taupe}},item.freq==="weekly"?"Weekly · "+(item.days||[]).join(", "):item.freq==="monthly"?"Monthly · day "+item.monthDay:"Every "+item.intervalDays+"d"),
                item.advanceDays>0&&React.createElement("span",{style:{...st.tag,background:C.peanut}},"Book "+item.advanceDays+"d early")
              )
            ),
            React.createElement("div",{style:{display:"flex",gap:2,alignItems:"center"}},
              React.createElement("button",{style:st.iconBtn,onClick:()=>setEditItem(item)},"✏️"),
              React.createElement("button",{style:st.iconBtn,onClick:()=>deleteItem(item.id)},"×")
            )
          ),
          item.link&&React.createElement("a",{href:item.link,target:"_blank",rel:"noreferrer",style:st.linkBtn},item.linkLabel||"🔗 Open Link"),
          React.createElement("div",{style:st.divider}),
          React.createElement(MemoBlock,{st,item,onSaveMemo:saveMemo}),
          React.createElement("div",{style:st.divider}),
          React.createElement("div",{style:{marginTop:4}},shown.map((occ,i)=>React.createElement(OccChip,{key:i,st,occ,itemId:item.id,done:item.done,onToggle:toggleDone}))),
          React.createElement("button",{style:st.ghostBtn,onClick:()=>toggleExpand(item.id)},isExp?"▲ Show less":"▼ Show more dates")
        );
      })
    )),
    React.createElement("div",{style:st.bottomBtns},
      React.createElement("button",{style:st.actionBtn(C.peanut),onClick:()=>setShowAdd(true)},"+ Add Reminder"),
      React.createElement("button",{style:st.actionBtn(C.taupe),onClick:()=>setShowAddCat(true)},"🗂️ New Category")
    ),
    showAdd&&React.createElement(ItemModal,{st,item:null,onSave:addItem,onClose:()=>setShowAdd(false),cats,title:"+ Add Reminder"}),
    editItem&&React.createElement(ItemModal,{st,item:editItem,onSave:saveEdit,onClose:()=>setEditItem(null),cats,title:"✏️ Edit Reminder"}),
    showAddCat&&React.createElement(AddCatModal,{st,onSave:addCat,onClose:()=>setShowAddCat(false),existing:cats})
  );
}

function App(){
  const[pages,setPages]=useState([]);
  const[activeIdx,setActiveIdx]=useState(0);
  const[fontIdx,setFontIdx]=useState(0);
  const[sizeIdx,setSizeIdx]=useState(1);
  const[showSettings,setShowSettings]=useState(false);
  const[showAddPage,setShowAddPage]=useState(false);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);

  const st=makeStyles(FONTS[fontIdx].value,FONT_SIZES[sizeIdx].base);

  // Load everything from Firestore on mount
  useEffect(()=>{
    (async()=>{
      // Load settings
      const settings=await loadSettings();
      if(settings.fontIdx!=null)setFontIdx(settings.fontIdx);
      if(settings.sizeIdx!=null)setSizeIdx(settings.sizeIdx);

      // Load pages list
      const pagesSnap=await getDoc(doc(db,"settings","pages"));
      let pagesList=pagesSnap.exists()?pagesSnap.data().list:[{id:"my-reminders",name:"My Reminders",emoji:"🌿"}];

      // Load each page's data
      const loaded=await Promise.all(pagesList.map(async p=>{
        const data=await loadPage(p.id);
        if(data)return{...p,...data};
        // first time — seed with defaults for "my-reminders"
        if(p.id==="my-reminders"){
          const seed={...p,items:DEFAULT_ITEMS,cats:DEFAULT_CATS,catColors:DEFAULT_CAT_COLORS};
          await savePage(p.id,seed);
          return seed;
        }
        return{...p,items:[],cats:DEFAULT_CATS,catColors:DEFAULT_CAT_COLORS};
      }));

      setPages(loaded);
      setLoading(false);
      await setupNotifications();
      scheduleLocalNotifications(loaded);
    })();
  },[]);

  const savePagesList=async(list)=>{await setDoc(doc(db,"settings","pages"),{list:list.map(p=>({id:p.id,name:p.name,emoji:p.emoji}))},{merge:true});};

  const updatePage=async(updated)=>{
    setSyncing(true);
    const newPages=pages.map(p=>p.id===updated.id?updated:p);
    setPages(newPages);
    await savePage(updated.id,updated);
    setSyncing(false);
  };

  const addPage=async(info)=>{
    const id="page-"+Date.now();
    const newPage={id,name:info.name,emoji:info.emoji,items:[],cats:DEFAULT_CATS,catColors:DEFAULT_CAT_COLORS};
    const newPages=[...pages,newPage];
    setPages(newPages);
    await savePage(id,newPage);
    await savePagesList(newPages);
    setActiveIdx(newPages.length-1);
    setShowAddPage(false);
  };

  const saveSettingsToCloud=async(fi,si)=>{await saveSettings({fontIdx:fi,sizeIdx:si});};

  if(loading)return React.createElement("div",{className:"spinner"},"Loading your reminders… 🌿");

  const activePage=pages[activeIdx]||pages[0];

  return React.createElement("div",{style:st.app},
    // Header
    React.createElement("div",{style:st.header},
      React.createElement("div",{style:st.title},activePage?activePage.emoji+" "+activePage.name:"My Reminders"),
      React.createElement("div",{style:st.subtitle},new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})),
      React.createElement("button",{onClick:()=>setShowSettings(s=>!s),style:{position:"absolute",top:10,right:12,background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1,fontSize:10,color:"rgba(255,255,255,0.7)"}},showSettings?"▲":"▼")
    ),

    // Settings panel
    showSettings&&React.createElement("div",{style:st.settingsBar},
      React.createElement("div",null,
        React.createElement("span",{style:st.settingsLabel},"Font"),
        React.createElement("select",{style:st.settingsSelect,value:fontIdx,onChange:e=>{const v=Number(e.target.value);setFontIdx(v);saveSettingsToCloud(v,sizeIdx);}},FONTS.map((f,i)=>React.createElement("option",{key:i,value:i},f.label)))
      ),
      React.createElement("div",null,
        React.createElement("span",{style:st.settingsLabel},"Size"),
        React.createElement("select",{style:st.settingsSelect,value:sizeIdx,onChange:e=>{const v=Number(e.target.value);setSizeIdx(v);saveSettingsToCloud(fontIdx,v);}},FONT_SIZES.map((s,i)=>React.createElement("option",{key:i,value:i},s.label)))
      )
    ),

    // Sync status
    syncing&&React.createElement("div",{style:st.syncBadge},"☁️ Saving…"),

    // Active page content
    activePage&&React.createElement(PageView,{key:activePage.id,st,page:activePage,onUpdate:updatePage}),

    // Tab bar
    React.createElement("div",{className:"tab-bar"},
      pages.map((p,i)=>React.createElement("button",{key:p.id,className:"tab-btn"+(i===activeIdx?" active":""),onClick:()=>setActiveIdx(i)},
        React.createElement("span",{className:"tab-icon"},p.emoji),
        React.createElement("span",null,p.name.length>8?p.name.slice(0,8)+"…":p.name)
      )),

    ),

    // Add page modal
    showAddPage&&React.createElement(AddPageModal,{st,onSave:addPage,onClose:()=>setShowAddPage(false),existing:pages})
  );
}

// Mount React
const container=document.getElementById("root");
const root=ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

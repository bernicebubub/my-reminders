let ci = 0;

function getTodayStr(){return new Date().toISOString().split("T")[0];}
function addDays(ds,n){const d=new Date(ds);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function formatDate(ds){return new Date(ds+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}
function getDow(ds){const d=new Date(ds+"T00:00:00");return["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][d.getDay()===0?6:d.getDay()-1];}
function daysUntil(ds){return Math.round((new Date(ds+"T00:00:00")-new Date(getTodayStr()))/86400000);}

function nextOccurrences(item,count=4){
  const today=getTodayStr(),results=[];
  if(item.freq==="weekly"){
    const map={Mon:0,Tue:1,Wed:2,Thu:3,Fri:4,Sat:5,Sun:6};
    const dow=new Date(today+"T00:00:00").getDay(),ti=dow===0?6:dow-1;
    const sel=(item.days||[]).map(d=>map[d]).sort((a,b)=>a-b);
    if(!sel.length)return[];
    let off=0,ch=0;
    while(results.length<count&&ch<60){const idx=(ti+off)%7;if(sel.includes(idx)){const d=addDays(today,off);results.push({date:d,remind:addDays(d,-(item.advanceDays||0))});}off++;ch++;}
  }else if(item.freq==="monthly"){
    const d=new Date(today+"T00:00:00");
    for(let i=0;results.length<count&&i<count+3;i++){const yr=d.getFullYear()+Math.floor((d.getMonth()+i)/12),mo=(d.getMonth()+i)%12,day=Math.min(item.monthDay||1,new Date(yr,mo+1,0).getDate()),occ=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;if(occ>=today)results.push({date:occ,remind:addDays(occ,-(item.advanceDays||0))});}
  }else if(item.freq==="every X days"){
    let start=item.startDate||today;
    while(start<today)start=addDays(start,item.intervalDays||30);
    for(let i=0;i<count;i++){const occ=addDays(start,i*(item.intervalDays||30));results.push({date:occ,remind:addDays(occ,-(item.advanceDays||0))});}
  }
  return results;
}

function useStorage(key,fallback){
  const [val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):fallback;}catch{return fallback;}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}

    modal:{position:"fixed",inset:0,background:"rgba(80,60,50,0.32)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100},
    modalBox:{background:C.white,borderRadius:18,padding:"26px 22px",width:"92%",maxWidth:420,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(130,100,80,0.18)"},

    todayBox:{background:C.peanut,borderRadius:16,padding:"14px 18px",margin:"16px 16px 0",color:"#fff"},

    memoBox:{background:C.peach,borderRadius:8,padding:"8px 10px",marginTop:6,fontSize:fs(13),fontFamily:font,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.6},
    memoTA:{width:"100%",border:"none",borderRadius:8,padding:"6px 8px",fontSize:fs(13),background:C.card,color:C.text,boxSizing:"border-box",fontFamily:font,resize:"vertical",minHeight:60,outline:"none"},
    linkBtn:{display:"inline-flex",alignItems:"center",gap:5,background:C.taupe,color:"#fff",border:"none",borderRadius:20,padding:"6px 15px",fontSize:fs(13),cursor:"pointer",fontFamily:font,textDecoration:"none",marginTop:6},
    divider:{borderTop:"1px solid "+C.card,margin:"10px 0"},
    ghostBtn:{background:"none",border:"none",color:C.taupe,fontSize:fs(12),cursor:"pointer",fontFamily:font,padding:"2px 0"},
    bottomBtns:{display:"flex",gap:10,justifyContent:"center",margin:"22px 16px 0",flexWrap:"wrap"},

    settingsLabel:{fontSize:fs(12),color:C.taupe,fontFamily:font,marginRight:4},

function FormFields({st,freq,setFreq,days,setDays,monthDay,setMonthDay,intervalDays,setIntervalDays,advanceDays,setAdvanceDays,startDate,setStartDate,memo,setMemo,link,setLink,linkLabel,setLinkLabel}){
  const toggle=d=>setDays(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d]);
  return(
    <React.Fragment>
      <label style={st.label}>Frequency</label>
      <select style={st.select} value={freq} onChange={e=>setFreq(e.target.value)}>{FREQ_OPTIONS.map(f=><option key={f}>{f}</option>)}</select>
      {freq==="weekly"&&<React.Fragment><label style={st.label}>Days of the Week</label><div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>{DAYS.map(d=><button key={d} style={st.dayBtn(days.includes(d))} onClick={()=>toggle(d)}>{d}</button>)}</div></React.Fragment>}
      {freq==="monthly"&&<React.Fragment><label style={st.label}>Day of Month</label><input style={st.input} type="number" min="1" max="28" value={monthDay} onChange={e=>setMonthDay(e.target.value)}/></React.Fragment>}
      {freq==="every X days"&&<React.Fragment><label style={st.label}>Every how many days?</label><input style={st.input} type="number" min="1" value={intervalDays} onChange={e=>setIntervalDays(e.target.value)}/><label style={st.label}>Starting from</label><input style={st.input} type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/></React.Fragment>}
      <label style={st.label}>Book/remind how many days in advance?</label>
      <input style={st.input} type="number" min="0" value={advanceDays} onChange={e=>setAdvanceDays(e.target.value)}/>
      <label style={st.label}>📝 Notes / Memo</label>
      <textarea style={st.textarea} value={memo} onChange={e=>setMemo(e.target.value)} placeholder="e.g. Shopping list, notes..."/>
      <label style={st.label}>🔗 Quick Link URL</label>
      <input style={st.input} value={link} onChange={e=>setLink(e.target.value)} placeholder="https://wa.me/... or https://..."/>
      <label style={st.label}>🏷️ Button Label</label>
      <input style={st.input} value={linkLabel} onChange={e=>setLinkLabel(e.target.value)} placeholder="e.g. 💬 Book Lash, 🛒 HKTVmall"/>
    </React.Fragment>
  );
}

function EditModal({st,item,onSave,onClose,cats}){
  const [name,setName]=useState(item.name);
  const [cat,setCat]=useState(item.cat);
  const [freq,setFreq]=useState(item.freq);
  const [days,setDays]=useState(item.days||[]);
  const [monthDay,setMonthDay]=useState(item.monthDay||1);
  const [intervalDays,setIntervalDays]=useState(item.intervalDays||30);
  const [advanceDays,setAdvanceDays]=useState(item.advanceDays||0);
  const [startDate,setStartDate]=useState(item.startDate||getTodayStr());
  const [memo,setMemo]=useState(item.memo||"");
  const [link,setLink]=useState(item.link||"");
  const [linkLabel,setLinkLabel]=useState(item.linkLabel||"");
  const save=()=>{
    if(!name.trim())return alert("Please enter a name.");
    if(freq==="weekly"&&!days.length)return alert("Select at least one day.");
    const u={...item,name:name.trim(),cat,freq,advanceDays:Number(advanceDays),memo,link,linkLabel};
    if(freq==="monthly")u.monthDay=Number(monthDay);
    if(freq==="weekly")u.days=days;
    if(freq==="every X days"){u.intervalDays=Number(intervalDays);u.startDate=startDate;}
    onSave(u);
  };
  return(
    <div style={st.modal} onClick={onClose}>
      <div style={st.modalBox} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,marginBottom:4}}>✏️ Edit Reminder</div>
        <label style={st.label}>Task Name</label>
        <input style={st.input} value={name} onChange={e=>setName(e.target.value)}/>
        <label style={st.label}>Category</label>
        <select style={st.select} value={cat} onChange={e=>setCat(e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select>
        <FormFields {...{st,freq,setFreq,days,setDays,monthDay,setMonthDay,intervalDays,setIntervalDays,advanceDays,setAdvanceDays,startDate,setStartDate,memo,setMemo,link,setLink,linkLabel,setLinkLabel}}/>
        <button style={st.saveBtn} onClick={save}>Save Changes</button>
        <button style={st.cancelBtn} onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

function AddModal({st,onSave,onClose,cats}){
  const [name,setName]=useState("");
  const [cat,setCat]=useState(cats[0]||"Other");
  const [freq,setFreq]=useState("monthly");
  const [days,setDays]=useState([]);
  const [monthDay,setMonthDay]=useState(1);
  const [intervalDays,setIntervalDays]=useState(30);
  const [advanceDays,setAdvanceDays]=useState(0);
  const [startDate,setStartDate]=useState(getTodayStr());
  const [memo,setMemo]=useState("");
  const [link,setLink]=useState("");
  const [linkLabel,setLinkLabel]=useState("");
  const save=()=>{
    if(!name.trim())return alert("Please enter a name.");
    if(freq==="weekly"&&!days.length)return alert("Select at least one day.");
    const item={id:Date.now(),name:name.trim(),cat,freq,advanceDays:Number(advanceDays),done:{},memo,link,linkLabel};
    if(freq==="monthly")item.monthDay=Number(monthDay);
    if(freq==="weekly")item.days=days;
    if(freq==="every X days"){item.intervalDays=Number(intervalDays);item.startDate=startDate;}
    onSave(item);
  };
  return(
    <div style={st.modal} onClick={onClose}>
      <div style={st.modalBox} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,marginBottom:4}}>+ Add New Reminder</div>
        <label style={st.label}>Task Name</label>
        <input style={st.input} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Gym session"/>
        <label style={st.label}>Category</label>
        <select style={st.select} value={cat} onChange={e=>setCat(e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select>
        <FormFields {...{st,freq,setFreq,days,setDays,monthDay,setMonthDay,intervalDays,setIntervalDays,advanceDays,setAdvanceDays,startDate,setStartDate,memo,setMemo,link,setLink,linkLabel,setLinkLabel}}/>
        <button style={st.saveBtn} onClick={save}>Save Reminder</button>
        <button style={st.cancelBtn} onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

function AddCatModal({st,onSave,onClose,existing}){
  const [name,setName]=useState("");
  const save=()=>{const n=name.trim();if(!n)return alert("Enter a name.");if(existing.map(c=>c.toLowerCase()).includes(n.toLowerCase()))return alert("Already exists.");onSave(n);};
  return(
    <div style={st.modal} onClick={onClose}>
      <div style={{...st.modalBox,maxHeight:"unset",padding:"24px 22px"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:18,marginBottom:4}}>🗂️ New Category</div>
        <label style={st.label}>Category Name</label>
        <input style={st.input} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Health, Finance, Kids..." autoFocus/>
        <button style={st.saveBtn} onClick={save}>Add Category</button>
        <button style={st.cancelBtn} onClick={onClose}>Cancel</button>
      </div>
    </div>
  );
}

function OccChip({st,occ,itemId,done,onToggle}){
  const du=daysUntil(occ.date),rdu=daysUntil(occ.remind),key=occ.date,isDone=done?.[key],isUrgent=rdu<=0&&!isDone;
  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginTop:7}}>
        <span style={{...st.occChip,background:isDone?"#ddeedd":C.card}}>
          {getDow(occ.date)} {formatDate(occ.date)}
          {du===0?" 🔔 Today!":du===1?" · Tomorrow":du>0?" · in "+du+"d":" · Past"}
        </span>
        <button style={{...st.doneBtn,background:isDone?"#b8ddb8":C.card,color:isDone?"#3a7a3a":C.textLight}} onClick={()=>onToggle(itemId,key)}>
          {isDone?"✓ Done":"Mark done"}
        </button>
      </div>
      {occ.remind!==occ.date&&<div style={isUrgent?st.urgentBadge:st.remindBadge}>{isUrgent?"⚠️ Book now!":"📅 Remind to book: "+formatDate(occ.remind)}</div>}
    </div>
  );
}

function MemoBlock({st,item,onSaveMemo}){
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(item.memo||"");
  const save=()=>{onSaveMemo(item.id,draft);setEditing(false);};
  if(!editing)return(
    <div>
      {item.memo
        ?<div style={st.memoBox}>{item.memo}<br/><button style={{...st.ghostBtn,marginTop:4}} onClick={()=>setEditing(true)}>✏️ Edit notes</button></div>
        :<button style={st.ghostBtn} onClick={()=>setEditing(true)}>+ notes</button>
      }
    </div>
  );
  return(
    <div style={{marginTop:6}}>
      <textarea style={st.memoTA} value={draft} onChange={e=>setDraft(e.target.value)} placeholder="Write your notes, shopping list..." autoFocus/>
      <div style={{display:"flex",gap:6,marginTop:4}}>
        <button style={{...st.doneBtn,background:C.peanut,color:"#fff"}} onClick={save}>Save</button>
        <button style={{...st.doneBtn,background:C.card,color:C.text}} onClick={()=>setEditing(false)}>Cancel</button>
      </div>
    </div>
  );
}

function App(){
  const [items,setItems]=useStorage("routine_items_v5",DEFAULT_ITEMS);
  const [cats,setCats]=useStorage("routine_cats_v2",DEFAULT_CATS);
  const [catColors,setCatColors]=useStorage("routine_cat_colors_v2",DEFAULT_CAT_COLORS);
  const [fontIdx,setFontIdx]=useStorage("routine_font_idx",0);
  const [sizeIdx,setSizeIdx]=useStorage("routine_size_idx",1);
  const [showAdd,setShowAdd]=useState(false);
  const [showAddCat,setShowAddCat]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const [expanded,setExpanded]=useState({});
  const [showSettings,setShowSettings]=useState(false);

  const st=makeStyles(FONTS[fontIdx].value,FONT_SIZES[sizeIdx].base);

  const toggleDone=(id,k)=>setItems(p=>p.map(it=>it.id===id?{...it,done:{...it.done,[k]:!it.done[k]}}:it));
  const deleteItem=id=>{if(window.confirm("Delete this reminder?"))setItems(p=>p.filter(it=>it.id!==id));};
  const addItem=item=>{setItems(p=>[...p,item]);setShowAdd(false);};
  const saveEdit=u=>{setItems(p=>p.map(it=>it.id===u.id?u:it));setEditItem(null);};
  const saveMemo=(id,memo)=>setItems(p=>p.map(it=>it.id===id?{...it,memo}:it));
  const toggleExpand=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const addCat=name=>{const color=EXTRA_COLORS[ci%EXTRA_COLORS.length];ci++;setCats(p=>[...p,name]);setCatColors(p=>({...p,[name]:color}));setShowAddCat(false);};

  const today=getTodayStr();
  const todayAlerts=[];
  items.forEach(item=>nextOccurrences(item,8).forEach(occ=>{if(occ.remind===today||occ.date===today)todayAlerts.push({name:item.name,date:occ.date,isEvent:occ.date===today});}));
  const presentCats=cats.filter(c=>items.some(i=>i.cat===c));

  return(
    <div style={st.app}>
      <div style={st.header}>
        <div style={st.title}>My Routine Reminders</div>
        <div style={st.subtitle}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        <button onClick={()=>setShowSettings(s=>!s)} style={{position:"absolute",top:10,right:12,background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:1,fontSize:10,color:"rgba(255,255,255,0.7)"}}>
          {showSettings?"▲":"▼"}
        </button>
      </div>

      {showSettings&&(
        <div style={st.settingsBar}>
          <div><span style={st.settingsLabel}>Font</span>
            <select style={st.settingsSelect} value={fontIdx} onChange={e=>setFontIdx(Number(e.target.value))}>
              {FONTS.map((f,i)=><option key={i} value={i}>{f.label}</option>)}
            </select>
          </div>
          <div><span style={st.settingsLabel}>Size</span>
            <select style={st.settingsSelect} value={sizeIdx} onChange={e=>setSizeIdx(Number(e.target.value))}>
              {FONT_SIZES.map((s,i)=><option key={i} value={i}>{s.label}</option>)}
            </select>
          </div>
        </div>
      )}

      <div style={st.todayBox}>
        <div style={{fontSize:st.secTitle.fontSize,letterSpacing:2,textTransform:"uppercase",opacity:0.85,fontFamily:FONTS[fontIdx].value}}>📌 Today's Alerts</div>
        {todayAlerts.length===0
          ?<div style={{fontSize:st.remindBadge.fontSize,opacity:0.85,fontFamily:FONTS[fontIdx].value,marginTop:6}}>Nothing urgent today — enjoy your day! 🌿</div>
          :todayAlerts.map((a,i)=><div key={i} style={{fontSize:st.occChip.fontSize,marginTop:6,fontFamily:FONTS[fontIdx].value}}>{a.isEvent?"🔔":"📅"} <b>{a.name}</b> — {a.isEvent?"Today!":"Book by today (event: "+formatDate(a.date)+")"}</div>)
        }
      </div>

      {presentCats.map(cat=>(
        <div key={cat} style={st.section}>
          <div style={st.secTitle}>{cat}</div>
          {items.filter(i=>i.cat===cat).map(item=>{
            const allOccs=nextOccurrences(item,6),isExp=expanded[item.id],shown=isExp?allOccs:allOccs.slice(0,1);
            return(
              <div key={item.id} style={{...st.card,borderLeftColor:catColors[item.cat]||C.taupe}}>
                <div style={st.row}>
                  <div style={{flex:1}}>
                    <span style={st.itemName}>{item.name}</span>
                    <div style={{marginTop:3,display:"flex",gap:4,flexWrap:"wrap"}}>
                      <span style={{...st.tag,background:catColors[item.cat]||C.taupe}}>{item.cat}</span>
                      <span style={{...st.tag,background:C.taupe}}>
                        {item.freq==="weekly"?"Weekly · "+(item.days||[]).join(", "):item.freq==="monthly"?"Monthly · day "+item.monthDay:"Every "+item.intervalDays+"d"}
                      </span>
                      {item.advanceDays>0&&<span style={{...st.tag,background:C.peanut}}>Book {item.advanceDays}d early</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:2,alignItems:"center"}}>
                    <button style={st.iconBtn} onClick={()=>setEditItem(item)}>✏️</button>
                    <button style={st.iconBtn} onClick={()=>deleteItem(item.id)}>×</button>
                  </div>
                </div>
                {item.link&&<a href={item.link} target="_blank" rel="noreferrer" style={st.linkBtn}>{item.linkLabel||"🔗 Open Link"}</a>}
                <div style={st.divider}/>
                <MemoBlock st={st} item={item} onSaveMemo={saveMemo}/>
                <div style={st.divider}/>
                <div style={{marginTop:4}}>
                  {shown.map((occ,i)=><OccChip key={i} st={st} occ={occ} itemId={item.id} done={item.done} onToggle={toggleDone}/>)}
                </div>
                <button style={st.ghostBtn} onClick={()=>toggleExpand(item.id)}>{isExp?"▲ Show less":"▼ Show more dates"}</button>
              </div>
            );
          })}
        </div>
      ))}

      <div style={st.bottomBtns}>
        <button style={st.actionBtn(C.peanut)} onClick={()=>setShowAdd(true)}>+ Add Reminder</button>
        <button style={st.actionBtn(C.taupe)} onClick={()=>setShowAddCat(true)}>🗂️ New Category</button>
      </div>

      {showAdd&&<AddModal st={st} onSave={addItem} onClose={()=>setShowAdd(false)} cats={cats}/>}
      {showAddCat&&<AddCatModal st={st} onSave={addCat} onClose={()=>setShowAddCat(false)} existing={cats}/>}
      {editItem&&<EditModal st={st} item={editItem} onSave={saveEdit} onClose={()=>setEditItem(null)} cats={cats}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
